name: Build macOS App

on:
  workflow_dispatch:

jobs:
  build-macos-app:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode
        run: |
          set -euo pipefail
          for candidate in /Applications/Xcode_26.1.1.app /Applications/Xcode_26.1.app /Applications/Xcode.app; do
            if [[ -d "$candidate" ]]; then
              sudo xcode-select -s "${candidate}/Contents/Developer"
              echo "DEVELOPER_DIR=${candidate}/Contents/Developer" >> "$GITHUB_ENV"
              break
            fi
          done
          xcodebuild -version

      - name: Build with xcodebuild
        run: |
          set -euo pipefail
          xcodebuild build \
            -scheme CodexBar \
            -configuration Release \
            -derivedDataPath .build/DerivedData \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="-" \
            ONLY_ACTIVE_ARCH=NO

      - name: Package app bundle
        id: pkg
        run: |
          set -euo pipefail
          APP_SRC="$(find .build/DerivedData -path "*/Release/CodexBar.app" -type d | head -1)"
          if [[ -z "$APP_SRC" ]]; then
            echo "CodexBar.app not found in DerivedData, searching broader..."
            find .build/DerivedData -name "CodexBar.app" -type d
            exit 1
          fi
          echo "Found app at: $APP_SRC"
          echo "Contents:"
          ls -la "$APP_SRC/Contents/"
          ls -la "$APP_SRC/Contents/MacOS/" || true
          ls -la "$APP_SRC/Contents/Frameworks/" || true
          ls -la "$APP_SRC/Contents/Resources/" || true

          APP_DIR="${RUNNER_TEMP}/CodexBar.app"
          cp -R "$APP_SRC" "$APP_DIR"
          echo "app_dir=$APP_DIR" >> "$GITHUB_OUTPUT"

      - name: Upload macOS app
        uses: actions/upload-artifact@v6
        with:
          name: CodexBar-macOS
          path: ${{ steps.pkg.outputs.app_dir }}
