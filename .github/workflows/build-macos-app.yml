name: Build macOS App

on:
  workflow_dispatch:

jobs:
  build-macos-app:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode
        run: |
          set -euo pipefail
          for candidate in /Applications/Xcode_26.1.1.app /Applications/Xcode_26.1.app /Applications/Xcode.app; do
            if [[ -d "$candidate" ]]; then
              sudo xcode-select -s "${candidate}/Contents/Developer"
              echo "DEVELOPER_DIR=${candidate}/Contents/Developer" >> "$GITHUB_ENV"
              break
            fi
          done
          xcodebuild -version

      - name: Build with xcodebuild
        run: |
          set -euo pipefail
          xcodebuild build \
            -scheme CodexBar \
            -configuration Release \
            -derivedDataPath .build/DerivedData \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="-" \
            ONLY_ACTIVE_ARCH=NO

      - name: Package app bundle
        id: pkg
        run: |
          set -euo pipefail
          PRODUCTS=".build/DerivedData/Build/Products/Release"

          echo "=== Products directory ==="
          ls -la "$PRODUCTS/"

          APP_DIR="${RUNNER_TEMP}/CodexBar.app"
          mkdir -p "$APP_DIR/Contents/MacOS"
          mkdir -p "$APP_DIR/Contents/Frameworks"
          mkdir -p "$APP_DIR/Contents/Resources"

          # Copy main binary
          cp "$PRODUCTS/CodexBar" "$APP_DIR/Contents/MacOS/CodexBar"
          chmod +x "$APP_DIR/Contents/MacOS/CodexBar"

          # Copy CLI helper
          if [[ -f "$PRODUCTS/CodexBarCLI" ]]; then
            mkdir -p "$APP_DIR/Contents/Helpers"
            cp "$PRODUCTS/CodexBarCLI" "$APP_DIR/Contents/Helpers/CodexBarCLI"
            chmod +x "$APP_DIR/Contents/Helpers/CodexBarCLI"
          fi

          # Copy all resource bundles (.bundle)
          find "$PRODUCTS" -name "*.bundle" -type d | while read bundle; do
            echo "Copying resource bundle: $bundle"
            cp -R "$bundle" "$APP_DIR/Contents/Resources/"
          done

          # Copy all frameworks
          find "$PRODUCTS" -name "*.framework" -type d -maxdepth 1 | while read fw; do
            echo "Copying framework: $fw"
            cp -R "$fw" "$APP_DIR/Contents/Frameworks/"
          done

          # Also check for frameworks in subdirectories
          find "$PRODUCTS" -name "Sparkle.framework" -type d | head -1 | while read fw; do
            if [[ ! -d "$APP_DIR/Contents/Frameworks/Sparkle.framework" ]]; then
              echo "Copying Sparkle from: $fw"
              cp -R "$fw" "$APP_DIR/Contents/Frameworks/"
            fi
          done

          # Copy any dylibs
          find "$PRODUCTS" -name "*.dylib" -maxdepth 1 -type f | while read dylib; do
            echo "Copying dylib: $dylib"
            cp "$dylib" "$APP_DIR/Contents/Frameworks/"
          done

          # Fix rpaths
          install_name_tool -add_rpath @executable_path/../Frameworks "$APP_DIR/Contents/MacOS/CodexBar" 2>/dev/null || true
          install_name_tool -add_rpath @executable_path/../Resources "$APP_DIR/Contents/MacOS/CodexBar" 2>/dev/null || true

          # Create Info.plist
          cat > "$APP_DIR/Contents/Info.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>CodexBar</string>
              <key>CFBundleIdentifier</key>
              <string>com.steipete.codexbar</string>
              <key>CFBundleName</key>
              <string>CodexBar</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>0.20.0</string>
              <key>LSUIElement</key>
              <true/>
              <key>LSMinimumSystemVersion</key>
              <string>14.0</string>
          </dict>
          </plist>
          EOF

          echo "=== Final app bundle ==="
          find "$APP_DIR" -type f | sort
          echo "app_dir=$APP_DIR" >> "$GITHUB_OUTPUT"

      - name: Upload macOS app
        uses: actions/upload-artifact@v6
        with:
          name: CodexBar-macOS
          path: ${{ steps.pkg.outputs.app_dir }}
